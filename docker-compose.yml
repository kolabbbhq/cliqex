services:
  db:
    image: postgres:15-alpine
    container_name: errandsbuddy_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: errandsbuddy       
    ports:
      - '5478:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: